name: Mirage

options:
  bundleIdPrefix: fr.dubertrand
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES

configs:
  Debug: debug
  Release: release

packages:
  MiragePackage:
    url: https://github.com/haplollc/Mirage.git
    exactVersion: 0.2.0

targets:
  MirageApp:
    type: application
    platform: iOS
    productName: Mirage
    deploymentTarget: "26.0"
    sources:
      - path: Mirage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.dubertrand.Mirage
        PRODUCT_NAME: Mirage
        PRODUCT_MODULE_NAME: MirageApp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Mirage
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Save images you create with Mirage to your photo library.
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: NO
        CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]: NO
        CODE_SIGN_IDENTITY[sdk=iphonesimulator*]: ""
        DEVELOPMENT_TEAM: Z47DK7XWB4
    entitlements:
      path: Mirage/Mirage.entitlements
      properties:
        com.apple.developer.kernel.extended-virtual-addressing: true
        com.apple.developer.kernel.increased-memory-limit: true
    dependencies:
      - package: MiragePackage
        product: Mirage

  MirageTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: MirageTests
    dependencies:
      - target: MirageApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.dubertrand.MirageTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO

  MirageUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: MirageUITests
    dependencies:
      - target: MirageApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.dubertrand.MirageUITests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO

schemes:
  Mirage:
    build:
      targets:
        MirageApp: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - MirageTests
        - MirageUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
